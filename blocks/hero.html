<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #F9F9F9;
      color: #333333;
    }

    .card {
      width: 100%;
      overflow: hidden;
    }

    /* ── Layout ── */
    .hero {
      display: grid;
      grid-template-columns: 1fr 50%;
      min-height: 620px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Left: content ── */
    .hero__content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 56px 72px 64px;
    }

    .hero__eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #F0902C;
      margin-bottom: 22px;
    }

    .hero__title {
      font-size: clamp(28px, 2.8vw, 46px);
      font-weight: 800;
      line-height: 1.13;
      letter-spacing: -0.025em;
      color: #1A1A1A;
      margin-bottom: 20px;
    }

    .hero__title em {
      font-style: normal;
      color: #F0902C;
    }

    .hero__subtitle {
      font-size: clamp(15px, 1.3vw, 17px);
      font-weight: 400;
      line-height: 1.65;
      color: #666666;
      margin-bottom: 38px;
      max-width: 460px;
    }

    .hero__cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #F0902C;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 16px 30px;
      border-radius: 100px;
      text-decoration: none;
      align-self: flex-start;
      margin-bottom: 48px;
      transition: background 0.2s, transform 0.15s;
    }

    .hero__cta:hover {
      background: #d97e20;
      transform: translateY(-1px);
    }

    .hero__cta svg { flex-shrink: 0; }

    /* ── Trust signals ── */
    .hero__trust {
      display: flex;
      gap: 0;
      padding-top: 28px;
      border-top: 1px solid #E8E8E8;
    }

    .trust-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding-right: 28px;
      margin-right: 28px;
      border-right: 1px solid #E0E0E0;
    }

    .trust-item:last-child {
      border-right: none;
      padding-right: 0;
      margin-right: 0;
    }

    .trust-item__value {
      font-size: clamp(16px, 1.4vw, 20px);
      font-weight: 700;
      color: #1A1A1A;
      white-space: nowrap;
    }

    .trust-item__label {
      font-size: 11px;
      font-weight: 500;
      color: #AAAAAA;
      line-height: 1.4;
    }

    /* ── Right: photo column ── */
    .hero__photo {
      position: relative;
      background: #F9F9F9;
      overflow: hidden;
      min-height: 620px;
    }

    .hero__photo img {
      position: absolute;
      bottom: 0;
      left: -12%;
      height: 110%;
      width: auto;
      max-width: none;
      display: block;
      object-fit: contain;
      object-position: bottom left;
    }

    /* ── Tablet ── */
    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .hero__photo {
        order: -1;
        min-height: 380px;
        height: 380px;
      }

      .hero__content {
        padding: 48px 32px 56px;
      }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .hero__photo {
        min-height: 300px;
        height: 300px;
      }

      .hero__content {
        padding: 40px 20px 48px;
      }

      .hero__trust {
        flex-direction: column;
        gap: 16px;
      }

      .trust-item {
        flex-direction: row;
        align-items: center;
        gap: 10px;
        border-right: none;
        border-bottom: 1px solid #EEEEEE;
        padding-right: 0;
        padding-bottom: 14px;
        margin-right: 0;
      }

      .trust-item:last-child { border-bottom: none; padding-bottom: 0; }

      .trust-item__value { min-width: 80px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <section class="hero">

      <div class="hero__content">
        <span class="hero__eyebrow">Маркетолог-практик · МСБ</span>
        <h1 class="hero__title">
          Вложили в маркетинг — а&nbsp;заявок <em>больше не&nbsp;стало?</em>
        </h1>
        <p class="hero__subtitle">
          Беру хаотичный маркетинг — отдаю понятную систему&nbsp;с конкретными каналами и метриками.
        </p>
        <a class="hero__cta" href="https://t.me/sergeynasyrov_bot">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="currentColor"/>
          </svg>
          Обсудить мой проект
        </a>
        <div class="hero__trust">
          <div class="trust-item">
            <span class="trust-item__value">8 лет</span>
            <span class="trust-item__label">в маркетинге МСБ</span>
          </div>
          <div class="trust-item">
            <span class="trust-item__value">ROMI 120%+</span>
            <span class="trust-item__label">у клиентов</span>
          </div>
          <div class="trust-item">
            <span class="trust-item__value">20+</span>
            <span class="trust-item__label">реализованных<br>проектов</span>
          </div>
        </div>
      </div>

      <div class="hero__photo">
        <img src="../assets/avatar.png" alt="Сергей Насыров — маркетолог">
      </div>

    </section>
  </div>
</body>
</html>
