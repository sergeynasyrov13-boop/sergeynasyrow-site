<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nav</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #F9F9F9;
      min-height: 120px;
    }

    .card { width: 100%; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .nav.scrolled {
      border-bottom-color: #F0F0F0;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    }

    .nav__inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    /* ── Brand ── */
    .nav__brand {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex-shrink: 0;
    }

    .nav__brand-name {
      font-size: 15px;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .nav__brand-role {
      font-size: 10px;
      font-weight: 500;
      color: #AAAAAA;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1;
    }

    /* ── Links ── */
    .nav__links {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav__link {
      font-size: 13px;
      font-weight: 500;
      color: #666666;
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav__link:hover { color: #1A1A1A; }

    /* ── CTA ── */
    .nav__cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #F0902C;
      color: #FFFFFF;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 100px;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    .nav__cta:hover { background: #d97e20; transform: translateY(-1px); }

    /* ── Burger (mobile) ── */
    .nav__burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }

    .nav__burger span {
      display: block;
      width: 22px;
      height: 2px;
      background: #1A1A1A;
      border-radius: 2px;
      transition: transform 0.2s, opacity 0.2s;
    }

    /* ── Mobile menu ── */
    .nav__mobile {
      display: none;
      flex-direction: column;
      gap: 0;
      background: #FFFFFF;
      border-top: 1px solid #F0F0F0;
      padding: 16px 32px 24px;
    }

    .nav__mobile.open { display: flex; }

    .nav__mobile-link {
      font-size: 15px;
      font-weight: 500;
      color: #333333;
      text-decoration: none;
      padding: 14px 0;
      border-bottom: 1px solid #F4F4F4;
    }

    .nav__mobile-link:last-child { border-bottom: none; }

    .nav__mobile-cta {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #F0902C;
      color: #FFFFFF;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: 100px;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .nav__inner { padding: 0 20px; }
      .nav__links { display: none; }
      .nav__cta { display: none; }
      .nav__burger { display: flex; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header class="nav" id="nav">
      <div class="nav__inner">
        <a class="nav__brand" href="#">
          <span class="nav__brand-name">Сергей Насыров</span>
          <span class="nav__brand-role">Маркетолог-практик</span>
        </a>

        <nav class="nav__links">
          <a class="nav__link" href="#about">Обо мне</a>
          <a class="nav__link" href="#services">Услуги</a>
          <a class="nav__link" href="#cases">Кейсы</a>
          <a class="nav__link" href="#how">Как работаю</a>
          <a class="nav__link" href="#faq">Вопросы</a>
        </nav>

        <a class="nav__cta" href="https://t.me/sergeynasyrov_bot">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
          </svg>
          Обсудить проект
        </a>

        <button class="nav__burger" id="burger" aria-label="Меню">
          <span></span><span></span><span></span>
        </button>
      </div>

      <div class="nav__mobile" id="mobileMenu">
        <a class="nav__mobile-link" href="#about">Обо мне</a>
        <a class="nav__mobile-link" href="#services">Услуги</a>
        <a class="nav__mobile-link" href="#cases">Кейсы</a>
        <a class="nav__mobile-link" href="#how">Как работаю</a>
        <a class="nav__mobile-link" href="#faq">Вопросы</a>
        <a class="nav__mobile-cta" href="https://t.me/sergeynasyrov_bot">Обсудить проект</a>
      </div>
    </header>
  </div>

  <script>
    const burger = document.getElementById('burger');
    const menu = document.getElementById('mobileMenu');
    burger.addEventListener('click', () => menu.classList.toggle('open'));

    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
