<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #F9F9F9;
    }

    .card { width: 100%; overflow: hidden; }

    .footer {
      background: #1A1A1A;
      padding: 64px 64px 40px;
    }

    .footer__inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Top row ── */
    .footer__top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 48px;
      border-bottom: 1px solid #2E2E2E;
      margin-bottom: 32px;
    }

    .footer__brand {}

    .footer__name {
      font-size: 18px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .footer__role {
      font-size: 12px;
      font-weight: 500;
      color: #666666;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .footer__nav {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .footer__nav-link {
      font-size: 13px;
      font-weight: 500;
      color: #666666;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer__nav-link:hover { color: #FFFFFF; }

    .footer__cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #F0902C;
      color: #FFFFFF;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 11px 20px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .footer__cta:hover { background: #d97e20; }

    /* ── Bottom row ── */
    .footer__bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer__copy {
      font-size: 12px;
      font-weight: 400;
      color: #444444;
    }

    .footer__tg {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      color: #444444;
      transition: color 0.2s;
    }

    .footer__tg:hover { color: #FFFFFF; }

    .footer__tg svg { width: 16px; height: 16px; }

    @media (max-width: 768px) {
      .footer { padding: 48px 32px 32px; }

      .footer__top {
        flex-direction: column;
        gap: 32px;
      }

      .footer__nav {
        flex-wrap: wrap;
        gap: 20px;
      }

      .footer__bottom {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
    }

    @media (max-width: 480px) {
      .footer { padding: 40px 20px 28px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <footer class="footer">
      <div class="footer__inner">

        <div class="footer__top">
          <div class="footer__brand">
            <div class="footer__name">Сергей Насыров</div>
            <div class="footer__role">Маркетолог-практик · МСБ</div>
          </div>

          <nav class="footer__nav">
            <a class="footer__nav-link" href="#about">Обо мне</a>
            <a class="footer__nav-link" href="#services">Услуги</a>
            <a class="footer__nav-link" href="#cases">Кейсы</a>
            <a class="footer__nav-link" href="#faq">Вопросы</a>
            <a class="footer__cta" href="https://t.me/sergeynasyrov_bot">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
              </svg>
              Написать
            </a>
          </nav>
        </div>

        <div class="footer__bottom">
          <div class="footer__copy">© 2025 Сергей Насыров. Все права защищены.</div>
          <a class="footer__tg" href="https://t.me/sergeynasyrov_bot">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
            </svg>
            @sergeynasyrov_bot
          </a>
        </div>

      </div>
    </footer>
  </div>
</body>
</html>
