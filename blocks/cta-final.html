<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Финальный CTA</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #FFFFFF;
      color: #333333;
    }

    .card { width: 100%; overflow: hidden; }

    .cta-final {
      max-width: 1200px;
      margin: 0 auto;
      padding: 112px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .cta-final__label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #F0902C;
      background: #FFF3E6;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 32px;
    }

    .cta-final__label-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #F0902C;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .cta-final__title {
      font-size: clamp(32px, 4vw, 56px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #1A1A1A;
      margin-bottom: 24px;
      max-width: 700px;
    }

    .cta-final__desc {
      font-size: clamp(15px, 1.4vw, 18px);
      font-weight: 400;
      line-height: 1.7;
      color: #666666;
      margin-bottom: 48px;
      max-width: 520px;
    }

    .cta-final__btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #F0902C;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 18px 36px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 24px;
    }

    .cta-final__btn:hover { background: #d97e20; transform: translateY(-2px); }

    .cta-final__note {
      font-size: 13px;
      font-weight: 500;
      color: #BBBBBB;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cta-final__note::before,
    .cta-final__note::after {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: #E8E8E8;
    }

    @media (max-width: 768px) {
      .cta-final { padding: 80px 32px; }
    }

    @media (max-width: 480px) {
      .cta-final { padding: 64px 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <section class="cta-final">

      <div class="cta-final__label">
        <span class="cta-final__label-dot"></span>
        Беру новые проекты
      </div>

      <h2 class="cta-final__title">Готовы разобраться в&nbsp;ситуации?</h2>

      <p class="cta-final__desc">
        Напишите в&nbsp;бот, что происходит у&nbsp;вас с&nbsp;маркетингом — отвечу, подходит ли вам мой формат работы и&nbsp;с&nbsp;чего лучше начать.
      </p>

      <a class="cta-final__btn" href="https://t.me/sergeynasyrov_bot">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="currentColor"/>
        </svg>
        Обсудить мой проект
      </a>

      <div class="cta-final__note">Одновременно работаю не более чем с&nbsp;4 проектами</div>

    </section>
  </div>
</body>
</html>
